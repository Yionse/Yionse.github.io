<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.ico">
    <!--设置页面图标-->
    <title>玩家对战</title>
    <style>
        * {
            /*取消所有的边距*/
            margin: 0;
            padding: 0;
        }
        
        body {
            /*添加一个背景*/
            background: rgba(0, 0, 0, .3);
        }
        
        .father {
            /*标签位置设置为相对的*/
            position: relative;
            /*让棋盘居中*/
            text-align: center;
        }
        /*canvas的大小需要在起标签内设置，否则会拉伸或缩小默认的大小*/
        
        #canvas {
            /*位置绝对*/
            position: absolute;
            top: 30px;
            left: 440px;
            /*设置所在层数，在上层*/
            z-index: 1;
            /*自定义鼠标样式*/
            cursor: url("cursorBlack.cur"), auto;
        }
        /*需要将img背景图的尺寸和canvas的尺寸设置相同*/
        
        img {
            width: 640px;
            height: 640px;
            /*位置绝对*/
            position: absolute;
            top: 30px;
            left: 440px;
        }
        
        #bg {
            /*使用C3盒子模型，使其使用内边距时 不会撑开盒子*/
            box-sizing: border-box;
            /*遮罩的位置要与棋盘重合*/
            position: absolute;
            width: 640px;
            height: 640px;
            top: 30px;
            left: 440px;
            background: rgba(0, 0, 0, .3);
            /*进入游戏时，用户并未点击开始游戏，此时棋盘无法操作，将黑色遮罩置于最上方*/
            z-index: 2;
            padding-top: 150px;
        }
        
        #bg button {
            position: absolute;
            /*设置按钮为块级元素，一行一个*/
            display: block;
            /*使按钮居中*/
            margin: 0 auto;
            /*设置宽高和背景*/
            width: 158px;
            height: 61px;
            background: url("images/ButtonBackground.png") no-repeat;
            /*按钮之间有一个间距*/
            top: 220px;
            left: 220px;
            /*更改鼠标样式*/
            cursor: pointer;
        }
        
        #bg :last-child {
            top: 320px;
        }
        
        .whiteWin,
        .blackWin {
            /*赢了的画面*/
            display: none;
            /*默认不显示*/
            position: absolute;
            /*调整位置大小及背景*/
            width: 640px;
            height: 640px;
            background: rgba(0, 0, 0, .3);
            top: 30px;
            left: 440px;
            z-index: 3;
            /*层级为最高，遮住所有*/
        }
        
        .whiteWin img,
        .blackWin img {
            /*两张照片位置的调整*/
            position: absolute;
            width: 640px;
            height: 320px;
            top: 320px;
            left: 0;
        }
        
        .whiteWin button,
        .blackWin button {
            /*重新开始按钮的位置大小以及背景的调整*/
            position: absolute;
            width: 158px;
            height: 61px;
            background: url("images/ButtonBackground.png") no-repeat;
            top: 260px;
            left: 220px;
            cursor: pointer;
        }
        
        .whiteWin :last-child,
        .blackWin :last-child {
            /*调整位置*/
            top: 50px;
            left: 210px;
            width: 200px;
            height: 200px;
        }
    </style>
</head>

<body onload="drawRect()">
    <div class="father">
        <canvas width="640px" height="640px" id="canvas" onmousedown="play(event)"></canvas>
        <img src="images/bg.jpeg">
        <div id="bg">
            <button id="star">开始游戏</button>
            <!--两个按钮-->
            <button id="home" onclick="window.location.href='index.html'">返回</button>
        </div>
    </div>
    <div class="whiteWin">
        <!--白色赢的画面-->
        <img src="win.png" alt="">
        <button id="wRenew" onclick="renewGame()">重新开始</button>
        <!--添加一个按钮让页面刷新，得已重新开始-->
        <img src="images/b.png" alt="">
    </div>
    <div class="blackWin">
        <!--黑色赢的画面-->
        <img src="win.png" alt="">
        <button id="bRenew" onclick="renewGame()">重新开始</button>
        <img src="images/w.png" alt="">
    </div>
    <audio id="chessMusic" src="buttonMusic.wav"></audio>
    <audio id="winMusic" src="win.ogg"></audio>
</body>

</html>
<script>
    var cnv; //定义一个变量，页面中的canvas元素
    var cxt; //定义一个变量，用于存放canvas元素得到的2D对象，也就是棋盘，后期所有的操作都在这个cxt基础上进行
    var img_b = new Image();
    img_b.src = 'images/w.png'; //创建黑方棋子的对象    
    var img_w = new Image();
    img_w.src = 'images/b.png'; //创建白方妻子的对象
    var isWhite = false; //设置是否轮到白棋
    var isWell = false; //设置该局是否赢了， 如果赢了就不能再走了
    var chessDate = new Array(15); //初始化棋盘，即横竖一共为15个格子
    var starGame = document.getElementById('star'); //获取开始游戏按钮
    var home = document.getElementById('home'); //获取返回按钮
    var bg = document.getElementById('bg'); //获取遮罩层
    var whiteWin = document.querySelector('.whiteWin'); //获取两个赢棋以后的盒子
    var blackWin = document.querySelector('.blackWin');
    var wRenew = document.getElementById('wRenew'); //获取两个重新开始的按钮
    var bRenew = document.getElementById('bRenew');

    var chessMusic = document.querySelector('#chessMusic');
    var winMusic = document.querySelector('#winMusic');
    starGame.addEventListener('click', function() { //给开始按钮添加点击方法
        bg.style.display = 'none'; //让遮罩层不显示
    });

    for (var x = 0; x < 15; x++) {
        chessDate[x] = new Array(15);
        for (var y = 0; y < 15; y++) { //双重for循环，用于创建一个二维数组，做到了横竖
            chessDate[x][y] = 0; //初始化0为没有走过的，1为白棋走的，2位黑棋走的
        }
    }

    function renewGame() {
        location.reload(); //让页面重新加载
    }

    function drawRect() {
        /**
         * 在body加载完以后，执行该函数
         * 该函数的作用为将棋盘画出来
         * */
        cnv = document.getElementById('canvas'); //首先获取到页面中的DOM元素
        cxt = cnv.getContext('2d'); //利用DOM元素得到2D对象，下面就可以进行操作了
        for (var i = 0; i <= 640; i += 40) { //利用for循环，将棋盘上的线画出
            cxt.beginPath(); //开始一个路径(横线)
            cxt.moveTo(0, i); //横线相关操作
            cxt.lineTo(640, i);
            cxt.closePath();
            cxt.stroke(); //画出
            cxt.beginPath(); //开始新路径(竖线)
            cxt.moveTo(i, 0);
            cxt.lineTo(i, 640);
            cxt.closePath();
            cxt.stroke(); //画出,至此横竖线都已完成
        }
    }

    function play(e) {
        /**
         * 该方法被触发时，游戏正式开始
         * */
        chessMusic.play();
        //获得鼠标的X，y坐标(棋盘中)，并且详细计算是在棋盘中的第几格，取整得到
        var x = parseInt((e.clientX - 450) / 40);
        var y = parseInt((e.clientY - 40) / 40);
        if (chessDate[x][y] !== 0) {
            //数组中的数字只有012三种可能，如果为非0的话，则说明该位置已经存在棋子了
            alert("你不能在这个位置下棋！");
            return;
        }
        if (isWhite) { //判断是否为白棋下
            isWhite = false; //如果是白棋下的话，则需要切换，下一步该黑棋下
            drawChess(1, x, y); //白棋的标志为1，所以要给画棋子函数一个参数，让它知道该画白棋还是黑棋，同时XY值也需要给
            cnv.style.cursor = 'url("cursorBlack.cur"), auto'; //让鼠标上的黑白棋实现切换
        } else {
            isWhite = true; //如果不是为白棋下，则下一步为白棋下
            drawChess(2, x, y); //黑棋的标志位2，同上
            cnv.style.cursor = 'url("cursorWhite.cur"), auto'; //让鼠标上的黑白棋实现切换
        }
    }

    function drawChess(chess, x, y) {
        /**
         * 画棋子函数，即当鼠标在棋盘中点击一下时，则触发该方法，chess为棋子的类型，XY为该棋子在棋盘中的格子并非坐标值
         * */
        if (isWell === true) { //首先判断该棋局是否已经结束，如果结束就不再画了
            alert("已经结束了，如果需要重玩，请刷新！");
            return;
        }
        if (x >= 0 && x < 15 && y >= 0 && y < 15) { //首先检查XY的值，必须要检查XY的值查看是否合法才可以进行操作
            if (chess === 1) { //判断这步棋是否为白棋下的
                //将一开始定义好的白棋对象，画在棋盘中，这里的位置需要进行操作，由于XY是第几格，而用drawImage函数时
                //需要准确的坐标，所以要*40+20
                cxt.drawImage(img_w, x * 40 + 20, y * 40 + 20);
                chessDate[x][y] = 1; //画完后，将该位置的值改为1，说明这里已经有一颗白色棋子了
            } else {
                cxt.drawImage(img_b, x * 40 + 20, y * 40 + 20);
                chessDate[x][y] = 2; //同白棋
            }
            //每一次下完以后，就需要判断输赢，由于是判断当前正在下的这一方，所以直接将刚才的标志位穿给判断函数就可以
            judge(x, y, chess);
        }
    }

    function judge(x, y, chess) { //判断输赢方法
        /**
         * 由于五子棋一共有四种取胜方法，即横竖的五颗棋子，然后是从左至右慢慢向下，从左至右慢慢向上，一共四种
         * 判断的时候需要将四种方法都分别考虑进去，如果存在一种，则说明有一方胜出
         * 判断是否胜利的方法为检查是否存在5颗同色棋子
         * */
        var count1 = 0; //第一种取胜方法
        for (var i = x; i >= 0; i--) { //获取到该棋子的X坐标，然后慢慢的往左移，则这是在判断横
            if (chessDate[i][y] !== chess) { //判断这枚棋子附近的棋子是否为与该棋子同色，
                break; //不同色，则不需要继续判断下去，说明这个位置被对方堵住了
            }
            count1++; //如果同色的话，棋子数量+1，继续执行下去，直到break，或者for语句结束
        }
        for (var i = x + 1; i < 15; i++) {
            if (chessDate[i][y] !== chess) {
                break;
            }
            count1++;
        } //同上，只不过方向改变，为慢慢往右移，因为两边都需要考虑

        var count2 = 0; //第二种取胜办法
        for (var i = y; i >= 0; i--) { //获取到该棋子Y坐标，然后慢慢的往上移动
            if (chessDate[x][i] !== chess) { //检查是否同色
                break; //不同色，结束
            }
            count2++; //同色的话，+1，继续执行for语句，直到结束或遇到break
        }
        for (var i = y + 1; i < 15; i++) {
            if (chessDate[x][i] !== chess) {
                break;
            }
            count2++; //同上，方向相反
        }

        var count3 = 0; //第三种取胜方法，为斜着，具体为从左上角至右下角斜，分为两部分检查
        for (var i = x, j = y; i >= 0, j >= 0; i--, j--) { //这里由于是斜着的，所以XY都会有变化，且XY同步变小，说明是棋子的上半部分
            if (chessDate[i][j] !== chess) { //这里是从该位置往左上角查看棋子颜色
                break; //如果不同，结束
            }
            count3++; //相同，棋子数量+1，继续执行该语句
        }
        for (var i = x + 1, j = y + 1; i < 15, j < 15; i++, j++) { //同步增大，为下半部分
            if (chessDate[i][j] !== chess) {
                break;
            }
            count3++; //同上，方向改变，这里是从该位置往右下角方向查看棋子颜色
        }

        var count4 = 0; //第四种取胜方法，斜着，为从右上角到左下角
        for (var i = x, j = y; i >= 0, j < 15; i--, j++) { //X减小，Y增大，说明为该棋子下半部分
            if (chessDate[i][j] !== chess) { //判断颜色是否相同
                break; //不同结束
            }
            count4++; //相同棋子数量+1，for循环继续
        }
        for (var i = x + 1, j = y - 1; i < 15, j >= 0; i++, j--) {
            if (chessDate[i][j] !== chess) {
                break;
            }
            count4++; //同上，方向改变，这里为上半部分
        }

        //判断如果数出来的棋子数量有一种情况大于等于5则游戏胜利，这里5可以随意更改，如果大于等于6的话，则变为了6子棋
        if (count1 >= 5 || count2 >= 5 || count3 >= 5 || count4 >= 5) {
            if (chess === 1) { //判断棋子的颜色为黑色还是白色
                winMusic.play();
                setTimeout(function() { //在赢了以后，不要马上显示赢的画面，过半秒钟再显示
                    whiteWin.style.display = 'block';
                }, 500);
            } else {
                winMusic.play();
                setTimeout(function() {
                    blackWin.style.display = 'block';
                }, 500);
            }
            isWell = true; //最后停止
        }
    }
</script>
